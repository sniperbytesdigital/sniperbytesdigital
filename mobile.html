<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desktop Only</title>
    <style>
        /* ---- RESET ---- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ---- BODY ---- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a2e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* ---- CARD CONTAINER ---- */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.8s ease-out;
        }

        /* ---- ICON ---- */
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }

        /* ---- HEADING (YOUR EXACT TEXT) ---- */
        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        /* ---- SUBTEXT ---- */
        p {
            font-size: 16px;
            color: #a0a0b8;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        /* ---- BUTTON (Cyan) ---- */
        .btn {
            display: inline-block;
            background: transparent;
            color: #00FFFF;
            border: 2px solid #00FFFF;
            border-radius: 50px;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .btn:hover {
            background: #00FFFF;
            color: #0a0a0a;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
            transform: scale(1.05);
        }

        /* ---- ANIMATION ---- */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="icon">🖥️</span>
        <h1>PLEASE VISIT OUT DESKTOP WEBSITE</h1>
        <p>
            This page is optimized for desktop viewing.<br>
            Please switch to a computer to continue.
        </p>
        <a href="#" class="btn">Visit Desktop Site</a>
    </div>

</body>
</html>
