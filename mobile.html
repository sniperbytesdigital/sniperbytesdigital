<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNIPER BYTES - control the soul of circuits</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --serpent-green: #0a5c36;
            --cyber-green: #00ff88;
            --dark-green: #063c23;
            --light-green: #1c7a4d;
            --accent-green: #0dff9d;
            --text-light: #e0e0e0;
            --text-dark: #121212;
            --bg-dark: #0a0f0c;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0c1511 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" opacity="0.05"><path d="M30,50 Q50,30 70,50 Q50,70 30,50" fill="none" stroke="%2300ff88" stroke-width="1"/></svg>');
            z-index: 0;
        }

        .container {
            text-align: center;
            z-index: 1;
            position: relative;
            padding: 2rem;
        }

        /* Logo Section */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.7));
            animation: pulse 2s infinite;
            border-radius: 50%;
        }

        .logo-main {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: white;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            margin-bottom: 0.5rem;
        }

        .logo-tagline {
            font-size: 1.1rem;
            font-style: italic;
            color: var(--accent-green);
            letter-spacing: 2px;
        }

        /* Message Box */
        .message-box {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--cyber-green);
            border-radius: 20px;
            padding: 3rem 2rem;
            max-width: 550px;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.2);
            animation: glow 2s ease-in-out infinite;
        }

        .message-box i {
            font-size: 4rem;
            color: var(--cyber-green);
            margin-bottom: 1.5rem;
        }

        .message-box h2 {
            font-size: 2rem;
            color: var(--cyber-green);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .message-box p {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-top: 1rem;
        }

        .device-icons {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .device-icons i {
            font-size: 2.5rem;
            margin: 0;
        }

        .device-icons .fa-laptop {
            color: var(--cyber-green);
        }

        .device-icons .fa-desktop {
            color: var(--accent-green);
        }

        .device-icons .fa-mobile-alt {
            color: #ff4444;
            opacity: 0.5;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); border-color: var(--cyber-green); }
            50% { box-shadow: 0 0 50px rgba(0, 255, 136, 0.5); border-color: var(--accent-green); }
            100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); border-color: var(--cyber-green); }
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        .floating {
            animation: float 5s ease-in-out infinite;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .logo-main {
                font-size: 2.5rem;
            }
            
            .logo-tagline {
                font-size: 0.9rem;
            }
            
            .message-box h2 {
                font-size: 1.5rem;
            }
            
            .message-box p {
                font-size: 1rem;
            }
            
            .message-box i {
                font-size: 3rem;
            }
            
            .device-icons i {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container floating">
            <div class="logo-icon">
                <img src="pic2.png" alt="SNIPER BYTES Logo">
            </div>
            <div class="logo-main">SNIPER BYTES</div>
            <div class="logo-tagline">control the soul of circuits</div>
        </div>

        <div class="message-box">
            <i class="fas fa-exclamation-triangle"></i>
            <h2>PLEASE LOG IN WITH</h2>
            <h2 style="margin-top: -5px;">LAPTOP OR DESKTOP</h2>
            <div class="device-icons">
                <i class="fas fa-laptop"></i>
                <i class="fas fa-desktop"></i>
                <i class="fas fa-mobile-alt"></i>
            </div>
            <p>This website is optimized for desktop and laptop devices only</p>
        </div>
    </div>
</body>
</html>
